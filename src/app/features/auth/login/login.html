<div class="auth-shell">
  <section class="auth-stage">
    <div class="auth-copy">
      <p class="eyebrow">Worknest access</p>
      <h1>Sign in to your workspace command center.</h1>
      <p>
        Manage bookings, spaces, approvals, and platform operations from the role-based
        dashboard designed for your account.
      </p>
    </div>
  </section>

  <section class="auth-panel">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Welcome back</h2>
        <p>Use your email and password to continue.</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="field">
          <label>Email</label>
          <input type="email" formControlName="email" placeholder="name@company.com" />
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" formControlName="password" placeholder="Enter your password" />
        </div>

        <button class="btn-primary auth-submit" type="submit" [disabled]="isLoading">
          {{ isLoading ? 'Logging in...' : 'Login to Worknest' }}
        </button>

        <p class="error-text" *ngIf="errorMessage">{{ errorMessage }}</p>
      </form>

      <p class="auth-footer">
        New here?
        <a routerLink="/register">Create an account</a>
      </p>
    </div>
  </section>
</div>
