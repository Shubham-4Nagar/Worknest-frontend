<div class="dashboard-shell" [class.sidebar-open]="isSidebarOpen">
  <button
    *ngIf="isSidebarOpen && isMobile "
    class="dashboard-backdrop"
    type="button"
    (click)="closeSidebar()"
    aria-label="Close navigation"
  ></button>

  <aside class="dashboard-sidebar">
    <div class="sidebar-brand">
      <div class="brand-lockup">
        <img src="worknest-logo.svg" alt="Worknest logo" class="brand-logo" />
        <div>
          <p class="eyebrow">Worknest</p>
          <h2>Workspace OS</h2>
        </div>
      </div>
      <button type="button" class="sidebar-close" (click)="closeSidebar()" aria-label="Close menu">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="sidebar-profile">
      <span class="sidebar-role">{{ role || 'Account' }}</span>
      <h3>{{ userName }}</h3>
      <p>{{ roleDescription }}</p>
    </div>

    <nav class="sidebar-nav">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
        (click)="closeSidebar()"
      >
        <i [class]="item.icon"></i>
        <div>
          <strong>{{ item.label }}</strong>
          <span>{{ item.description }}</span>
        </div>
      </a>
    </nav>

    <div class="sidebar-foot">
      <div class="sidebar-tip">
        <i class="bi bi-stars"></i>
        <span>Worknest keeps your space, bookings, and approvals in sync.</span>
      </div>

      <button class="sidebar-logout" type="button" (click)="logout()">
        <i class="bi bi-box-arrow-right"></i>
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <div class="dashboard-main">
    <header class="dashboard-topbar">
      <div class="topbar-title">
        <button type="button" class="menu-toggle" (click)="toggleSidebar()" aria-label="Open navigation">
          <i class="bi bi-list"></i>
        </button>
        <div>
          <p class="eyebrow">{{ role || 'Worknest' }} dashboard</p>
          <h1>{{ currentHeading }}</h1>
        </div>
      </div>

      <div class="topbar-actions">
        <a class="profile-button" routerLink="/dashboard/profile">
          <span class="profile-trigger-avatar">{{ userInitials }}</span>
          <span class="profile-meta">
            <strong>{{ userName }}</strong>
            <small>{{ userEmail }}</small>
          </span>
        </a>
      </div>
    </header>

    <main class="dashboard-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
